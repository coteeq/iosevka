[buildPlans.Uosevka2.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.Uosevka2.weights.Light]
shape = 300
menu = 300
css = 300

[buildPlans.Uosevka2.weights.SemiBold]
shape = 600
menu = 600
css = 600

[buildPlans.Uosevka2.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.Uosevka2.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
